<section @pageSectionEnter class="relative overflow-hidden px-6 pb-24 pt-32 md:pb-36 md:pt-48">
  <div class="mx-auto grid max-w-7xl grid-cols-1 items-center gap-12 lg:grid-cols-12">
    <div @staggerChildren class="z-10 lg:col-span-7">
      <h1 data-stagger-item class="serif-text mb-8 text-5xl font-bold leading-[1.1] tracking-tight text-on-surface md:text-7xl">
        Welcome to Your <span class="italic text-primary">Sanctuary</span>
      </h1>
      <p data-stagger-item class="mb-10 max-w-xl text-lg leading-relaxed text-on-surface-variant font-body md:text-xl">
        A contemporary community rooted in tradition, growing in love, and finding peace together in the digital age.
      </p>
      <div data-stagger-item class="flex flex-wrap gap-4">
        <button class="btn-primary-gradient rounded-xl px-10 py-4 text-lg font-semibold text-on-primary transition-all active:scale-95">
          Join Us This Sunday
        </button>
        <button class="rounded-xl bg-surface-container-high px-10 py-4 text-lg font-semibold text-primary transition-all active:scale-95">
          Watch Online
        </button>
      </div>
    </div>
    <div @softRise class="relative lg:col-span-5">
      <div class="absolute -inset-4 rounded-full bg-primary-container/20 blur-3xl"></div>
      <img
        alt="Community gathering"
        class="relative aspect-[4/5] w-full rounded-lg object-cover shadow-sm"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAp8k1Ic2DqgCygEbHzbLI-IsZoymdoYZBaFzmYiplmqyvdSUg1IWQdi5nQzskQTckzNNkNi3gZySellb0ND3jYpXUoDGbo_r0oMBbfJR58g1Tpu4AHO2SfBon2oLVGsiACpiQaF5S1NVLT3_cHd45kK69wCqiSXiNdDp6cMr86K5l6U-JCPrGVS6qGND4ZwNwkN8UwLNT_fIsVQ8HFij6sAYjuY3-xZHOWS6BfBAAbN0trQaaXu9hrTbLkZbKaiSsezNM6jjxTpXY"
      />
      <div class="absolute -bottom-6 -left-6 max-w-[200px] rounded-lg bg-surface-container-lowest p-6 shadow-sm">
        <p class="serif-text text-lg font-bold text-primary">10:00 AM</p>
        <p class="text-sm text-on-surface-variant">Sunday Service</p>
      </div>
    </div>
  </div>
</section>
